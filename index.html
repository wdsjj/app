<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法数独 - Magic Sudoku</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="magic-bg"></div>
    
    <div class="container">
        <header class="header">
            <div class="magic-icon">🔮</div>
            <h1 class="title">魔法数独</h1>
            <div class="magic-icon">✨</div>
        </header>
        
        <main class="main-content">
            <div class="game-area">
                <div class="sudoku-board">
                    <div class="board-paper">
                        <div class="sudoku-grid">
                            <div class="sudoku-row" v-for="(row, rowIndex) in board" :key="rowIndex">
                                <div 
                                    v-for="(cell, colIndex) in row" 
                                    :key="colIndex"
                                    class="sudoku-cell"
                                    :class="{
                                        'selected': selectedCell && selectedCell.row === rowIndex && selectedCell.col === colIndex,
                                        'error': cell.error,
                                        'original': cell.original,
                                        'highlighted': isHighlighted(rowIndex, colIndex),
                                        'completed': gameCompleted && !cell.error
                                    }"
                                    @click="selectCell(rowIndex, colIndex)"
                                >
                                    <span v-if="cell.value" :class="{'magic-number': gameCompleted && !cell.error}">{{ cell.value }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mobile-numpad" v-if="showMobileNumpad">
                    <div class="numpad-row">
                        <button v-for="n in 9" :key="n" class="numpad-btn" @click="inputNumber(n)">{{ n }}</button>
                    </div>
                    <div class="numpad-row">
                        <button class="numpad-btn numpad-clear" @click="clearCell">清除</button>
                    </div>
                </div>
            </div>
            
            <div class="control-panel">
                <div class="difficulty-section">
                    <h3 class="section-title">难度选择</h3>
                    <div class="difficulty-buttons">
                        <button 
                            v-for="level in difficulties" 
                            :key="level.value"
                            class="difficulty-btn"
                            :class="{ 'active': difficulty === level.value }"
                            @click="setDifficulty(level.value)"
                        >
                            {{ level.label }}
                        </button>
                    </div>
                </div>
                
                <div class="game-status">
                    <div class="status-item">
                        <span class="status-label">当前状态:</span>
                        <span class="status-value" :class="statusColor">{{ gameStatus }}</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">已填入:</span>
                        <span class="status-value">{{ filledCells }} / {{ totalCells }}</span>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn new-game" @click="newGame">
                        <span class="btn-icon">🗡️</span>
                        <span>新游戏</span>
                    </button>
                    <button class="action-btn hint" @click="showHint">
                        <span class="btn-icon">💡</span>
                        <span>提示</span>
                    </button>
                    <button class="action-btn rules-toggle" @click="toggleRules">
                        <span class="btn-icon">📜</span>
                        <span>规则说明</span>
                    </button>
                </div>
                
                <div class="rules-panel" v-if="showRules">
                    <h4 class="rules-title">数独规则</h4>
                    <ul class="rules-list">
                        <li>每行必须包含1-9的所有数字</li>
                        <li>每列必须包含1-9的所有数字</li>
                        <li>每个3×3区块必须包含1-9的所有数字</li>
                        <li>数字不能重复</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>
    
    <div class="celebration-modal" v-if="showCelebration">
        <div class="modal-content">
            <div class="celebration-header">
                <span class="celebration-icon">🎉</span>
                <h2 class="celebration-title">恭喜完成！</h2>
                <span class="celebration-icon">🎊</span>
            </div>
            <p class="celebration-text">您已成功解开魔法数独谜题！</p>
            <div class="magic-sparkles">
                <span v-for="i in 12" :key="i" class="sparkle" :style="{ '--delay': i * 0.1 + 's' }">✨</span>
            </div>
            <button class="celebration-btn" @click="newGame">
                <span>开始新游戏</span>
                <span class="btn-icon">🔮</span>
            </button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="script.js"></script>
</body>
</html>
